services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hotel_insights}
      POSTGRES_USER: ${POSTGRES_USER:-hotel_insights}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotel_insights_local}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-hotel_insights}:${POSTGRES_PASSWORD:-hotel_insights_local}@database:5432/${POSTGRES_DB:-hotel_insights}
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: app/frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
