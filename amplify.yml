version: 1
applications:
  - appRoot: app/frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@11.10.0
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm build
      artifacts:
        baseDirectory: dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .pnpm-store/**/*
