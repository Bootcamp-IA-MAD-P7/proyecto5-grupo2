name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-ec2-production
  cancel-in-progress: false

jobs:
  backend-tests:
    name: Backend quality gate
    uses: ./.github/workflows/backend-tests.yml

  frontend-build:
    name: Frontend quality gate
    uses: ./.github/workflows/frontend-build.yml

  deploy:
    name: Deploy production
    needs:
      - backend-tests
      - frontend-build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: hotel-insights-github-deploy

      - name: Send deployment command
        id: deploy
        shell: bash
        run: |
          command_id=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Hotel Insights from main" \
            --parameters '{"commands":["sudo -u ubuntu git -C /home/ubuntu/hotel-insights fetch origin main","sudo -u ubuntu git -C /home/ubuntu/hotel-insights switch main","sudo -u ubuntu git -C /home/ubuntu/hotel-insights pull --ff-only origin main","cd /home/ubuntu/hotel-insights && bash scripts/deploy_ec2.sh"]}' \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=${command_id}" >> "${GITHUB_OUTPUT}"

      - name: Wait for deployment result
        shell: bash
        env:
          COMMAND_ID: ${{ steps.deploy.outputs.command_id }}
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
        run: |
          for attempt in $(seq 1 90); do
            result=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --output json 2>/dev/null || true)

            status=$(jq -r '.Status // "Pending"' <<< "${result}")
            echo "Deployment status (${attempt}/90): ${status}"

            case "${status}" in
              Success)
                jq -r '.StandardOutputContent' <<< "${result}"
                exit 0
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                jq -r '.StandardOutputContent, .StandardErrorContent' <<< "${result}"
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "Deployment did not finish within 15 minutes." >&2
          exit 1
